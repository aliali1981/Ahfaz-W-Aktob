<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق مبادرة أحفظ وأكتب</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        
        :root {
            --primary-dark: #002d38; 
            --primary-mid: #004d61;  
            --accent-gold: #c5a021;  
            --bg-body: #f4f7f6;      
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            margin: 0; 
            background: var(--bg-body); 
            color: #333; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* القائمة الرئيسية */
        #mainMenu { 
            width: 100%; 
            min-height: 100vh; 
            background: var(--primary-dark); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 0; 
        }

        .menu-header { text-align: center; margin-bottom: 20px; }
        .menu-header img { width: 80px; background: #fff; border-radius: 15px; padding: 5px; border: 2px solid var(--accent-gold); }
        .menu-header h1 { color: var(--accent-gold); font-size: 1.4rem; margin: 10px 0; }

        .nav-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            width: 92%; 
            max-width: 500px; 
        }

        .menu-item { 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
            padding: 20px 10px; 
            border-radius: 15px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.1);
        }

        .menu-item i { font-size: 1.8rem; color: var(--accent-gold); margin-bottom: 8px; display: block; }
        .menu-item span { font-size: 0.9rem; font-weight: bold; }

        #contentArea { display: none; padding: 15px; }
        .back-btn { 
            background: var(--primary-dark); 
            color: var(--accent-gold); 
            padding: 12px; 
            border-radius: 10px; 
            width: 100%; 
            border: none; 
            font-weight: bold; 
            margin-bottom: 15px;
        }

        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .input-box { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Tajawal'; box-sizing: border-box; }
        .btn-lux { background: var(--primary-mid); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; }
        
        .section-content { display: none; }
        
        /* تحسين الجداول للموبايل */
        .table-res { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 400px; }
        th, td { padding: 8px; border: 1px solid #eee; text-align: center; }

        .footer-info { margin-top: auto; color: #ccc; text-align: center; padding: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="mainMenu">
        <div class="menu-header">
            <img src="https://raw.githubusercontent.com/aliali1981/Ahfaz-W-Aktob/main/logo.png" alt="Logo">
            <h1>مبادرة أحفظ وأكتب</h1>
        </div>
        <div class="nav-grid">
            <div class="menu-item" onclick="openSec('info')"><i class="fas fa-info-circle"></i><span>عن المبادرة</span></div>
            <div class="menu-item" onclick="openSec('texts')"><i class="fas fa-book"></i><span>النصوص</span></div>
            <div class="menu-item" onclick="openSec('upload')"><i class="fas fa-upload"></i><span>شارك الآن</span></div>
            <div class="menu-item" onclick="openSec('honor')"><i class="fas fa-medal"></i><span>لوحة الشرف</span></div>
            <div class="menu-item" onclick="openSec('gallery')"><i class="fas fa-video"></i><span>المعرض</span></div>
            <div class="menu-item" onclick="openSec('admin')"><i class="fas fa-lock"></i><span>الإدارة</span></div>
        </div>
        <div class="footer-info">إشراف الأستاذ: هشام الكحالي</div>
    </div>

    <div id="contentArea">
        <button class="back-btn" onclick="goHome()">← العودة للرئيسية</button>
        
        <div id="infoSec" class="section-content">
            <div class="card"><h3>أهداف المبادرة</h3><p>حفظ النصوص الأدبية المقررة للصف السابع وتطوير مهارات الإلقاء.</p></div>
        </div>

        <div id="textsSec" class="section-content">
            <div class="card"><p>نص: أنت وأنا</p><iframe width="100%" height="200" src="https://www.youtube.com/embed/UTb133uqsNE" frameborder="0"></iframe></div>
        </div>

        <div id="uploadSec" class="section-content">
            <div class="card">
                <select id="cls" class="input-box" onchange="fillStu()">
                    <option value="">اختر الصف</option>
                    <option value="7-1">7-1</option>
                    <option value="7-2">7-2</option>
                    <option value="7-3">7-3</option>
                </select>
                <select id="stu" class="input-box"><option>اختر الطالب</option></select>
                <input type="file" id="fIn" accept="video/*" class="input-box">
                <button class="btn-lux" onclick="upload()">إرسال الفيديو</button>
                <p id="upStatus"></p>
            </div>
        </div>

        <div id="adminSec" class="section-content">
            <div class="card">
                <input type="password" id="p" class="input-box" placeholder="كلمة المرور">
                <button class="btn-lux" onclick="auth()">دخول</button>
            </div>
            <div id="dash" style="display:none" class="table-res"></div>
        </div>

        <div id="honorSec" class="section-content"><div id="hList" class="nav-grid"></div></div>
        <div id="gallerySec" class="section-content"><div id="gList"></div></div>
    </div>

    <script>
        const students = {
            "7-1": ["احمد امجد احمد أحمد نجاد", "أحمد بن سعيد بن صالح أحمد جداد", "العبد بن محمد بن العبد زائد مسن", "النابي بن محمد بن سالم سهيل مسن", "بخيت بن احمد بن بخيت فريح مسن الكثيري", "تميم بن محمد بن سهيل جديد جداد الكثيري", "تميم بن محمد بن مبروك عبدالله المسهلي", "حمد بن محمد بن احمد الهزار الكثيري", "حمد بن محمد بن سعيد مسن", "راشد بن محمد بن أحمد محمد مسن الكثيري", "سالم بن سعد بن صلاح رعفيت", "سعيد بن شهاب بن احمد محمد مسن", "سعيد بن محمد بن صالح جداد", "سعيد بن محمد بن مبارك بخيت جداد", "سلطان بن حمزة بن مسلم نفل ربعات الكثيري", "عامر بن محمد بن مسلم بخيت المسهلي", "عبدالله بن سالم بن سهيل sليم قمصيت", "عمر احمد محمد احمد", "عمر عبدالقوى ابراهيم ابراهيم", "فريح بن عبدالله بن fريح احمد مسن", "مجتبى عيسى محمد", "مسلم بن محمد بن عوض خادم الوهيبي", "نصر بن سالم بن ظويهر سالم جداد", "ياسر بن عادل بن سالم مسن بيت كثير", "يوسف عمر احمد عبد الرحمن حاكم"],
            "7-2": ["ابراهيم محمد سالم السطري", "العباس بن مبخوت بن سالم مسن بيت كثير", "المنذر بن فواز بن سليمان عبدالله الهاشمي", "امير بن ناصر بن عبدالرحمن عبدالله البلوشي", "حسين سلامه حسين علي شليل", "خالد بن سالم بن علي عبدالله العلوي", "خالد بن محمد بن سهيل مطر جداد", "خالد بن مسلم بن أحمد جداد", "رويزم بن مسلم بن بخيت رويزم صندل المحرمي", "سالم بن مبارك بن سهيل محمد الراشدي", "سعد بن محمد بن سعد حفيظ خوار", "سعود بن عبدالله بن بخيت زايد مسن", "سعيد بن عبدالله بن سالم احمد جداد", "سعيد بن مسلم بن عبدالله سعيد جداد", "سلطان بن مسلم بن سالم صالح جداد", "عبدالله بن عارف بن سالم جداد", "علي بن سعيد بن علي خوار", "عمر فؤاد فهمي محمد فؤاد", "فهد بن غانم بن سالم جداد", "محسن معتصم محمد الامام", "محمد بن سالم بن مبخوت محمد الراشدي", "مسلم بن سالم بن سهيل الراشدي", "مصطفى محمود كريم ابراهيم احمد", "معاذ احمد سميح علي سيد", "منيف بن سعيد بن محمد سالم جداد", "هادف بن سعيد بن هادف حسن شحري خوار", "وائل بن حمود بن سالم سعيد الوائلي"],
            "7-3": ["أحمد بن نائف بن عبدالله محمد جداد", "الطلح بن سالم بن حسن علي خوار", "بخيت بن مسلم سالم مبخوت الراشدي", "بدر بن عامر بن مسلم الرحابه جداد", "حثيث بن سلطان بن محمد سهيل مسن", "حمد بن محمد بن عبدالله محمد جداد الكثيري", "سالم بن احمد بن سالم جداد", "سعيد بن مبروك بن سالم عامر المسهلي", "سهيل بن عبدالله بن سهيل حافظ خوار", "عبد الله أمير عبدالله نصر", "عبدالله بن محمد بن علي مهوي العامري", "علي بن ثاني بن علي سالم جداد بيت كثير", "فارس زياد محمد ابو رواع", "مبارك بن سعيد بن سالم خويتم مسن", "محسن بن عقيل بن سالم سعد خوار", "محمد بن بخيت بن فرج السنح شهوان المهري", "محمد بن علي بن بخيت محمد الراشدي", "محمد بن غانم بن الرضه سلاوم جداد", "محمد بن مسلم بن محمد مسلم جداد", "محمد بن ناصر بن عبدالله جداد", "محمد بن هيثم بن سالم فائل جداد الكثيري", "مسلم بن حسن بن هادف حسن شحري خوار", "معاذ fؤاد الحنيش الاحمد", "ناصر بن علي بن ناصر سهيل جداد", "نور الدين محسن العلي", "هيثم بن محمد بن سالم فائل جداد"]
        };

        try {
            firebase.initializeApp({ databaseURL: "https://ahfaz-w-aktob-default-rtdb.firebaseio.com/" });
            var db = firebase.database();
        } catch(e) { console.error("Firebase Error"); }

        function openSec(id) {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('contentArea').style.display = 'block';
            document.querySelectorAll('.section-content').forEach(s => s.style.display = 'none');
            document.getElementById(id + 'Sec').style.display = 'block';
        }

        function goHome() {
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById('contentArea').style.display = 'none';
        }

        function fillStu() {
            let c = document.getElementById('cls').value;
            let s = document.getElementById('stu');
            s.innerHTML = "";
            if(students[c]) students[c].forEach(n => s.add(new Option(n, n)));
        }

        function upload() {
            let file = document.getElementById('fIn').files[0];
            if(!file) return alert("اختر فيديو");
            let stat = document.getElementById('upStatus');
            stat.innerText = "جاري الرفع...";
            
            let fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', "Ahfaz-W-Aktob");

            fetch(`https://api.cloudinary.com/v1_1/duhzhaxxc/upload`, { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
                db.ref('submissions/' + document.getElementById('cls').value).push({
                    student: document.getElementById('stu').value,
                    video: data.secure_url
                }).then(() => { stat.innerText = "تم بنجاح!"; setTimeout(goHome, 2000); });
            });
        }

        function auth() {
            if(document.getElementById('p').value === "1234") {
                document.getElementById('dash').style.display = 'block';
                loadDash();
            }
        }

        function loadDash() {
            db.ref('submissions').on('value', snap => {
                let data = snap.val() || {};
                let h = "<table><tr><th>الطالب</th><th>الفيديو</th></tr>";
                Object.values(data).forEach(c => Object.values(c).forEach(s => {
                    h += `<tr><td>${s.student}</td><td><a href="${s.video}">عرض</a></td></tr>`;
                }));
                document.getElementById('dash').innerHTML = h + "</table>";
            });
        }
    </script>
</body>
</html>
