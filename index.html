<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اختبار مبادرة أحفظ وأكتب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        
        :root {
            --primary-dark: #002d38; 
            --accent-gold: #c5a021;  
            --bg-body: #f4f7f6;      
        }

        body { font-family: 'Tajawal', sans-serif; margin: 0; background: var(--bg-body); color: #333; overflow-x: hidden; }

        #mainMenu { width: 100%; min-height: 100vh; background: var(--primary-dark); display: flex; flex-direction: column; align-items: center; padding: 40px 0; box-sizing: border-box; }
        .menu-header { text-align: center; margin-bottom: 30px; }
        .menu-header h1 { color: var(--accent-gold); font-size: 1.8rem; font-weight: 900; }

        .nav-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 92%; max-width: 600px; }
        .menu-item { background: rgba(255,255,255,0.08); color: #fff; padding: 25px 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .menu-item i { font-size: 2rem; margin-bottom: 10px; display: block; color: var(--accent-gold); }

        #debug-console { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #000; color: #0f0; font-family: monospace; 
            font-size: 10px; padding: 10px; max-height: 100px; overflow-y: auto; z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="mainMenu">
        <div class="menu-header">
            <h1>اختبار واجهة المبادرة</h1>
            <p style="color: white;">إذا كنت ترى هذه الصفحة على الهاتف، فالتصميم سليم والمشكلة كانت في الربط البرمجي.</p>
        </div>

        <div class="nav-grid">
            <div class="menu-item"><i class="fas fa-file-invoice"></i><span>عن المبادرة</span></div>
            <div class="menu-item"><i class="fas fa-book-open"></i><span>مكتبة النصوص</span></div>
            <div class="menu-item"><i class="fas fa-cloud-upload-alt"></i><span>شارك الآن</span></div>
            <div class="menu-item"><i class="fas fa-trophy"></i><span>لوحة الشرف</span></div>
        </div>
    </div>

    <div id="debug-console">جاري فحص النظام...</div>

    <script>
        const log = document.getElementById('debug-console');
        window.onerror = function(msg, url, line) {
            log.innerHTML += `<br>❌ خطأ: ${msg} في السطر ${line}`;
            return false;
        };

        window.onload = function() {
            log.innerHTML += "<br>✅ تم تحميل الواجهة بنجاح.";
            log.innerHTML += `<br>📱 العرض الحالي: ${window.innerWidth}px`;
        };
    </script>
</body>
</html>
